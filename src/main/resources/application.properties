# Nome do projeto
spring.application.name=backend

# Configurações do Banco de Dados (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/rabitto_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# Configurações do JPA (Facilitador do banco)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuracoes de autenticacao
app.auth.jwt-secret=${APP_AUTH_JWT_SECRET:change-this-secret-key-with-at-least-32-characters}
app.auth.access-token-minutes=1440
app.auth.refresh-token-days=7

# Configuracoes de logging (ver logback-spring.xml para appenders/rotacao)
# LOG_PATH define a pasta dos arquivos de log (default ./logs)
logging.level.root=INFO
logging.level.com.rabitto.backend=DEBUG